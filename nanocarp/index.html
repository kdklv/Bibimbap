<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nanocarp</title>
  <link rel="stylesheet" href="../shared/theme.css">
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="begin-screen" id="begin">touch to begin</div>
  <script src="../shared/audio.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    let ctx, W, H;

    function setupCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      W = rect.width; H = rect.height;
      canvas.width = W * dpr; canvas.height = H * dpr;
      ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
    }

    // ─── State ────────────────────────────────────────────────────────────────
    let fish    = [];
    let ripples = [];
    let currentScale = 'pentatonic';

    const MAX_RIPPLES  = 6;
    const MAX_SPEED    = 2.0;
    const MIN_SPEED    = 0.3;
    const BOID_CELL    = 105;  // slightly > max interaction radius (100px)

    // Pre-allocated spatial grid — cleared and refilled each frame, no per-frame allocation
    let boidGrid = [], boidGridCols = 0, boidGridRows = 0;

    function initBoidGrid() {
      boidGridCols = Math.ceil(W / BOID_CELL) + 2;
      boidGridRows = Math.ceil(H / BOID_CELL) + 2;
      boidGrid = Array.from({ length: boidGridCols * boidGridRows }, () => []);
    }

    function buildBoidGrid() {
      for (const cell of boidGrid) cell.length = 0;
      for (const f of fish) {
        const gx = Math.min(boidGridCols - 1, Math.max(0, Math.floor(f.x / BOID_CELL)));
        const gy = Math.min(boidGridRows - 1, Math.max(0, Math.floor(f.y / BOID_CELL)));
        boidGrid[gx * boidGridRows + gy].push(f);
      }
    }

    function fishCount() {
      return Math.min(80, Math.max(30, Math.round(W * H / 6000)));
    }

    function makeFish(cx, cy, spread) {
      const angle = Math.random() * Math.PI * 2;
      const spd   = MIN_SPEED + Math.random() * 0.8;
      return {
        x: Math.max(12, Math.min(W - 12, cx + (Math.random() - 0.5) * spread)),
        y: Math.max(12, Math.min(H - 12, cy + (Math.random() - 0.5) * spread)),
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        angle,
        size: 6 + Math.random() * 3,   // maps to Tracy's sz via size/9
        hue:  170 + Math.random() * 40,
        wph:  Math.random() * Math.PI * 2,  // wag phase — body wiggle
        trail: [],
        dartFrames: 0,
      };
    }

    function initFish() {
      fish = Array.from({ length: fishCount() }, () =>
        makeFish(W * 0.5, H * 0.5, Math.min(W, H) * 0.5)
      );
    }

    function scatterFish() {
      for (const f of fish) {
        f.x = W * 0.1 + Math.random() * W * 0.8;
        f.y = H * 0.1 + Math.random() * H * 0.8;
        const a = Math.random() * Math.PI * 2;
        const s = MIN_SPEED + Math.random() * 0.8;
        f.vx = Math.cos(a) * s;
        f.vy = Math.sin(a) * s;
        f.dartFrames = 0;
        f.trail = [];
      }
    }

    // ─── Audio ────────────────────────────────────────────────────────────────
    let audioCtx = null, masterOut = null, convolver = null;
    let activeVoices = 0;
    const MAX_VOICES = 7;   // hard cap — prevents wall of sound
    let lastNoteTime = 0;   // per-ripple sweep throttle

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume();

      // Warm low-pass on everything — softens stacked voices
      const warmth = audioCtx.createBiquadFilter();
      warmth.type = 'lowpass';
      warmth.frequency.value = 3800;
      warmth.Q.value = 0.5;
      warmth.connect(audioCtx.destination);

      masterOut = audioCtx.createGain();
      masterOut.gain.value = 0.30;
      masterOut.connect(warmth);

      // Short, airy reverb — space without mud
      const sr  = audioCtx.sampleRate;
      const len = Math.floor(sr * 1.8);
      const buf = audioCtx.createBuffer(2, len, sr);
      for (let c = 0; c < 2; c++) {
        const ch = buf.getChannelData(c);
        for (let i = 0; i < len; i++)
          ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.0);
      }
      convolver = audioCtx.createConvolver();
      convolver.buffer = buf;
      const wet = audioCtx.createGain();
      wet.gain.value = 0.38;
      convolver.connect(wet);
      wet.connect(masterOut);
    }

    // Warm tone: sine carrier + soft 3rd harmonic (adds body, not brightness)
    // Short marimba-like decay so notes don't pile up
    function playNote(midi, vol = 0.11, dur = 0.55) {
      if (!audioCtx || activeVoices >= MAX_VOICES) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const freq = 440 * Math.pow(2, (midi - 69) / 12);
      const now  = audioCtx.currentTime;

      activeVoices++;
      setTimeout(() => activeVoices--, (dur + 0.15) * 1000);

      const carrier  = audioCtx.createOscillator();
      const body     = audioCtx.createOscillator();  // 3rd harmonic = warmth
      const bodyGain = audioCtx.createGain();
      const env      = audioCtx.createGain();

      carrier.type = 'sine';
      carrier.frequency.value = freq;

      body.type = 'sine';
      body.frequency.value = freq * 3;   // 3rd harmonic
      bodyGain.gain.value = 0.06;        // subtle — warms, doesn't sharpen
      body.connect(bodyGain);
      bodyGain.connect(env);

      // Quick attack, natural decay — like a plucked string or marimba key
      env.gain.setValueAtTime(0.0001, now);
      env.gain.linearRampToValueAtTime(vol, now + 0.008);
      env.gain.exponentialRampToValueAtTime(vol * 0.35, now + 0.08);
      env.gain.exponentialRampToValueAtTime(0.0001, now + dur);

      carrier.connect(env);
      env.connect(masterOut);
      env.connect(convolver);

      carrier.start(now); body.start(now);
      carrier.stop(now + dur + 0.1); body.stop(now + dur + 0.1);
    }

    // Ripple spawn: warm low thud + high sparkle, brief
    function playRippleNote(y) {
      const midi = Audio.noteFromY(y, H, currentScale, 2, 52);
      playNote(midi,     0.16, 1.0);  // root, longer
      playNote(midi + 7, 0.10, 0.7);  // fifth
    }

    // Fish note: short, distinct, throttled so sweep reads as arpeggio not blur
    function playFishNote(f) {
      const now = performance.now();
      if (now - lastNoteTime < 80) return;
      lastNoteTime = now;
      playNote(Audio.noteFromY(f.y, H, currentScale, 2), 0.09, 0.42);
    }

    // ─── Boids ────────────────────────────────────────────────────────────────
    // Spatial grid reduces O(n²) to O(n × k) where k ≈ fish in 3×3 cells
    function boidForces(f) {
      let sx=0, sy=0, ax=0, ay=0, cx=0, cy=0, sn=0, an=0, cn=0;
      const gx0 = Math.max(0, Math.floor(f.x / BOID_CELL) - 1);
      const gy0 = Math.max(0, Math.floor(f.y / BOID_CELL) - 1);
      const gx1 = Math.min(boidGridCols - 1, gx0 + 2);
      const gy1 = Math.min(boidGridRows - 1, gy0 + 2);
      for (let gx = gx0; gx <= gx1; gx++) {
        for (let gy = gy0; gy <= gy1; gy++) {
          for (const o of boidGrid[gx * boidGridRows + gy]) {
            if (o === f) continue;
            const dx = o.x - f.x, dy = o.y - f.y;
            const d  = Math.hypot(dx, dy);
            if (d < 30)  { sx -= dx/d; sy -= dy/d; sn++; }
            if (d < 80)  { ax += o.vx; ay += o.vy; an++; }
            if (d < 100) { cx += o.x;  cy += o.y;  cn++; }
          }
        }
      }
      let fx = 0, fy = 0;
      if (sn) { fx += (sx/sn) * 1.5;           fy += (sy/sn) * 1.5; }
      if (an) { fx += (ax/an - f.vx) * 0.8;    fy += (ay/an - f.vy) * 0.8; }
      if (cn) { fx += (cx/cn - f.x)  * 0.0005; fy += (cy/cn - f.y)  * 0.0005; }
      const m = 40;
      if (f.x < m)   fx += (m - f.x)   * 0.04;
      if (f.x > W-m) fx -= (f.x-(W-m)) * 0.04;
      if (f.y < m)   fy += (m - f.y)   * 0.04;
      if (f.y > H-m) fy -= (f.y-(H-m)) * 0.04;
      return { fx, fy };
    }

    // ─── Update ───────────────────────────────────────────────────────────────
    function updateFish() {
      buildBoidGrid();
      for (const f of fish) {
        const { fx, fy } = boidForces(f);
        f.vx += fx * 0.06;
        f.vy += fy * 0.06;
        if (f.dartFrames > 0) f.dartFrames--;

        let spd = Math.hypot(f.vx, f.vy);
        if (spd > MAX_SPEED)               { f.vx *= MAX_SPEED/spd; f.vy *= MAX_SPEED/spd; }
        if (spd < MIN_SPEED && spd > 0.001){ f.vx *= MIN_SPEED/spd; f.vy *= MIN_SPEED/spd; }
        if (spd < 0.001)                   { f.vx = MIN_SPEED; f.vy = 0; }

        f.x += f.vx;
        f.y += f.vy;
        f.wph += 0.26;
        f.trail.push({ x: f.x, y: f.y });
        if (f.trail.length > 14) f.trail.shift();

        const r = f.size;
        if (f.x < r)   { f.x = r;   f.vx =  Math.abs(f.vx) * 0.8; }
        if (f.x > W-r) { f.x = W-r; f.vx = -Math.abs(f.vx) * 0.8; }
        if (f.y < r)   { f.y = r;   f.vy =  Math.abs(f.vy) * 0.8; }
        if (f.y > H-r) { f.y = H-r; f.vy = -Math.abs(f.vy) * 0.8; }

        f.angle = Math.atan2(f.vy, f.vx);
      }
    }

    function updateRipples() {
      for (let i = ripples.length - 1; i >= 0; i--) {
        const rpl = ripples[i];
        rpl.r += rpl.speed;
        rpl.opacity = Math.max(0, 1 - rpl.r / rpl.maxR);

        for (const f of fish) {
          if (rpl.triggered.has(f)) continue;
          const d = Math.hypot(f.x - rpl.x, f.y - rpl.y);
          if (d > rpl.r - 8 && d < rpl.r + 8) {
            rpl.triggered.add(f);
            const a = Math.atan2(f.y - rpl.y, f.x - rpl.x);
            f.vx += Math.cos(a) * 5;
            f.vy += Math.sin(a) * 5;
            f.dartFrames = 20;
            playFishNote(f);
          }
        }

        if (rpl.r >= rpl.maxR) ripples.splice(i, 1);
      }
    }

    // ─── Draw ─────────────────────────────────────────────────────────────────
    // Adapted from Tracy's drawOneFish — same wag, breath, comet tail, sheen, forked tail
    function drawFish(f) {
      const h      = f.hue;
      const scared = f.dartFrames > 0;
      const sz     = f.size / 9;                          // Tracy uses sz≈1.0 with 9px ellipse
      const breath = 1 + 0.07 * Math.sin(f.wph * 0.18);  // subtle size pulse
      const s      = sz * breath;

      // Comet tail — world-space dots fading back through trail
      // Skip shadowBlur here (up to 80 fish × 14 dots = ~1000 ops); glow on body only
      const TRAIL = f.trail.length;
      for (let k = 0; k < TRAIL; k++) {
        const frac = (k + 1) / TRAIL;
        ctx.globalAlpha = frac * 0.52;
        ctx.fillStyle   = `hsl(${h}, 85%, 70%)`;
        ctx.beginPath();
        ctx.arc(f.trail[k].x, f.trail[k].y, s * frac * 2.8, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Body — same as Tracy: scaled local space, shadowBlur glow, sheen, forked tail
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(f.angle + Math.sin(f.wph) * (scared ? 0.42 : 0.14));
      ctx.scale(s, s);
      ctx.shadowBlur  = 10;
      ctx.shadowColor = `hsl(${h}, 95%, 75%)`;
      ctx.fillStyle   = `hsl(${h}, 80%, 78%)`;
      ctx.beginPath(); ctx.ellipse(0, 0, 9, 4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle  = `hsla(${h}, 90%, 95%, 0.35)`;
      ctx.beginPath(); ctx.ellipse(1, -1, 4, 1.4, -0.3, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = `hsl(${h}, 75%, 68%)`;
      ctx.lineWidth = 2.2; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-7, 0); ctx.lineTo(-15, -6);
      ctx.moveTo(-7, 0); ctx.lineTo(-15,  6);
      ctx.stroke();
      ctx.restore();
    }

    function drawRipple(rpl) {
      ctx.save();
      for (let k = -1; k <= 1; k++) {
        const r = rpl.r + k * 6;
        if (r <= 0) continue;
        ctx.beginPath();
        ctx.arc(rpl.x, rpl.y, r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(160, 210, 230, ${rpl.opacity * (0.65 - Math.abs(k) * 0.22)})`;
        ctx.lineWidth = 1.4;
        ctx.stroke();
      }
      ctx.restore();
    }

    function draw() {
      ctx.fillStyle = 'rgba(8, 12, 20, 0.25)';
      ctx.fillRect(0, 0, W, H);
      for (const rpl of ripples) drawRipple(rpl);
      for (const f of fish)      drawFish(f);
    }

    function loop() { updateFish(); updateRipples(); draw(); requestAnimationFrame(loop); }

    // ─── Input ────────────────────────────────────────────────────────────────
    function spawnRipple(x, y) {
      if (ripples.length >= MAX_RIPPLES) ripples.shift();
      const maxR = Math.max(W, H) * 0.7;
      ripples.push({ x, y, r: 0, maxR, speed: 2.5, opacity: 1.0, triggered: new Set() });
      playRippleNote(y);
    }

    function canvasPos(e) {
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    function setupInput() {
      canvas.addEventListener('pointerdown', e => {
        e.preventDefault();
        const p = canvasPos(e);
        spawnRipple(p.x, p.y);
      });
    }

    function setupKeyboard() {
      document.addEventListener('keydown', e => {
        switch (e.code) {
          case 'Space':   e.preventDefault(); spawnRipple(W/2, H/2); break;
          case 'KeyR':    scatterFish();       break;
          case 'KeyC':    initFish();          break;
          case 'Digit1':  currentScale = 'gamelan';    break;
          case 'Digit2':  currentScale = 'pentatonic'; break;
          case 'Digit3':  currentScale = 'wholeTone';  break;
          case 'Digit4':  currentScale = 'major';      break;
          case 'Digit5':  currentScale = 'minor';      break;
        }
      });
    }

    function onResize() {
      if (!W || !H) return;
      const rect = canvas.getBoundingClientRect();
      const ox = rect.width / W, oy = rect.height / H;
      setupCanvas();
      initBoidGrid();
      for (const f   of fish)    { f.x   *= ox; f.y   *= oy; }
      for (const rpl of ripples) { rpl.x *= ox; rpl.y *= oy; }
    }

    const beginEl = document.getElementById('begin');
    function begin() {
      initAudio();
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden && audioCtx && audioCtx.state === 'suspended')
          audioCtx.resume();
      });
      window.addEventListener('pageshow', () => {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      });

      beginEl.style.opacity = '0';
      beginEl.style.pointerEvents = 'none';
      setTimeout(() => beginEl.remove(), 700);

      setupCanvas();
      initFish();
      initBoidGrid();
      setupInput();
      setupKeyboard();
      window.addEventListener('resize', onResize);
      requestAnimationFrame(loop);
    }
    document.addEventListener('pointerdown', begin, { once: true });
  </script>
</body>
</html>
