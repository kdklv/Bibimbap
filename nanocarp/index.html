<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nanocarp</title>
  <link rel="stylesheet" href="../shared/theme.css">
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="begin-screen" id="begin">touch to begin</div>
  <script src="../shared/audio.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    let ctx, W, H;
    let vignetteGrad = null;

    function setupCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      W = rect.width; H = rect.height;
      canvas.width = W * dpr; canvas.height = H * dpr;
      ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      buildVignette();
    }

    function buildVignette() {
      const cx = W / 2, cy = H / 2;
      vignetteGrad = ctx.createRadialGradient(cx, cy, Math.min(W,H)*0.2, cx, cy, Math.max(W,H)*0.75);
      vignetteGrad.addColorStop(0, 'rgba(4,8,16,0)');
      vignetteGrad.addColorStop(1, 'rgba(3,6,14,0.52)');
    }

    // ─── State ────────────────────────────────────────────────────────────────
    let fish     = [];
    let ripples  = [];
    let motes    = [];
    let sparkles = [];
    let frame    = 0;
    let currentScale = 'pentatonic';

    const MAX_RIPPLES = 6;
    const MAX_SPEED   = 2.0;
    const MIN_SPEED   = 0.3;
    const TRAIL_LEN   = 7;

    function fishCount() {
      return Math.min(80, Math.max(30, Math.round(W * H / 6000)));
    }

    function makeFish(cx, cy, spread) {
      const angle = Math.random() * Math.PI * 2;
      const spd   = MIN_SPEED + Math.random() * 0.8;
      return {
        x:     Math.max(12, Math.min(W - 12, cx + (Math.random() - 0.5) * spread)),
        y:     Math.max(12, Math.min(H - 12, cy + (Math.random() - 0.5) * spread)),
        vx:    Math.cos(angle) * spd,
        vy:    Math.sin(angle) * spd,
        angle,
        size:  6 + Math.random() * 3,
        hue:   160 + Math.random() * 60,   // teal → aqua → blue
        trail: [],
        dartFrames: 0,
      };
    }

    function initFish() {
      fish = Array.from({ length: fishCount() }, () =>
        makeFish(W * 0.5, H * 0.5, Math.min(W, H) * 0.5)
      );
    }

    function scatterFish() {
      for (const f of fish) {
        f.x = W * 0.1 + Math.random() * W * 0.8;
        f.y = H * 0.1 + Math.random() * H * 0.8;
        const angle = Math.random() * Math.PI * 2;
        const spd   = MIN_SPEED + Math.random() * 0.8;
        f.vx = Math.cos(angle) * spd;
        f.vy = Math.sin(angle) * spd;
        f.dartFrames = 0;
        f.trail = [];
      }
    }

    // ─── Motes (ambient drifting particles) ───────────────────────────────────
    function initMotes() {
      motes = Array.from({ length: 55 }, () => ({
        x:     Math.random() * W,
        y:     Math.random() * H,
        r:     0.6 + Math.random() * 1.1,
        vx:    (Math.random() - 0.5) * 0.12,
        vy:    (Math.random() - 0.5) * 0.12,
        phase: Math.random() * Math.PI * 2,
        spd:   0.004 + Math.random() * 0.007,
        hue:   185 + Math.random() * 35,
      }));
    }

    // ─── Audio ────────────────────────────────────────────────────────────────
    let audioCtx = null, masterOut = null, convolver = null;
    let lastNoteTime = 0;

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume();

      masterOut = audioCtx.createGain();
      masterOut.gain.value = 0.26;
      masterOut.connect(audioCtx.destination);

      // Lush pond reverb
      const sr  = audioCtx.sampleRate;
      const len = Math.floor(sr * 4.0);
      const buf = audioCtx.createBuffer(2, len, sr);
      for (let c = 0; c < 2; c++) {
        const ch = buf.getChannelData(c);
        for (let i = 0; i < len; i++)
          ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.1);
      }
      convolver = audioCtx.createConvolver();
      convolver.buffer = buf;
      const wet = audioCtx.createGain();
      wet.gain.value = 0.62;
      convolver.connect(wet);
      wet.connect(masterOut);

      // Barely-there ambient drone — just colours the reverb
      startAmbientDrone();
    }

    function startAmbientDrone() {
      // A1 (55Hz) through reverb only — almost subliminal, adds "room"
      [55, 82.4].forEach((freq, i) => {
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const lfo  = audioCtx.createOscillator();
        const lg   = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        lfo.frequency.value = 0.05 + i * 0.03;
        lg.gain.value = 0.003;
        lfo.connect(lg); lg.connect(gain.gain);
        gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.010 - i * 0.003, audioCtx.currentTime + 5 + i * 2);
        osc.connect(gain);
        gain.connect(convolver); // wet only — stays subliminal
        osc.start(); lfo.start();
      });
    }

    // Warm sine + octave harmonic + gentle vibrato
    function playNote(midi, vol = 0.10, dur = 2.0) {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const freq = 440 * Math.pow(2, (midi - 69) / 12);
      const now  = audioCtx.currentTime;

      const carrier  = audioCtx.createOscillator();
      const harmonic = audioCtx.createOscillator();
      const harmGain = audioCtx.createGain();
      const lfo      = audioCtx.createOscillator();
      const lfoGain  = audioCtx.createGain();
      const env      = audioCtx.createGain();

      carrier.type = 'sine';
      carrier.frequency.value = freq;
      lfo.frequency.value = 5.0;
      lfoGain.gain.value  = freq * 0.005;
      lfo.connect(lfoGain); lfoGain.connect(carrier.frequency);

      harmonic.type = 'sine';
      harmonic.frequency.value = freq * 2;
      harmGain.gain.value = 0.09;
      harmonic.connect(harmGain); harmGain.connect(env);

      env.gain.setValueAtTime(0.0001, now);
      env.gain.linearRampToValueAtTime(vol, now + 0.07);
      env.gain.setTargetAtTime(vol * 0.2, now + 0.07, 0.55);
      env.gain.exponentialRampToValueAtTime(0.0001, now + dur);

      carrier.connect(env);
      env.connect(masterOut);
      env.connect(convolver);
      [carrier, harmonic, lfo].forEach(o => { o.start(now); o.stop(now + dur + 0.1); });
    }

    // Ripple chord: root + fifth, brief bass plonk + sustained ring
    function playRippleChord(y) {
      const midi = Audio.noteFromY(y, H, currentScale, 2, 52);
      playNote(midi,     0.14, 2.4);
      playNote(midi + 7, 0.09, 2.0);
      // soft low plonk
      const freq = 440 * Math.pow(2, (midi - 12 - 69) / 12);
      const now  = audioCtx.currentTime;
      const osc  = audioCtx.createOscillator();
      const g    = audioCtx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, now);
      g.gain.linearRampToValueAtTime(0.18, now + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 0.28);
      osc.connect(g); g.connect(masterOut); g.connect(convolver);
      osc.start(now); osc.stop(now + 0.32);
    }

    // Fish note: throttled so sweep sounds like a harp arpeggio
    function playFishNote(f) {
      const now = performance.now();
      if (now - lastNoteTime < 38) return;
      lastNoteTime = now;
      playNote(Audio.noteFromY(f.y, H, currentScale, 2), 0.065, 1.6);
    }

    // ─── Boids ────────────────────────────────────────────────────────────────
    function boidForces(f, all) {
      let sx=0, sy=0, ax=0, ay=0, cx=0, cy=0, sn=0, an=0, cn=0;
      for (const o of all) {
        if (o === f) continue;
        const dx = o.x - f.x, dy = o.y - f.y;
        const d  = Math.hypot(dx, dy);
        if (d < 30)  { sx -= dx/d; sy -= dy/d; sn++; }
        if (d < 80)  { ax += o.vx; ay += o.vy; an++; }
        if (d < 100) { cx += o.x;  cy += o.y;  cn++; }
      }
      let fx = 0, fy = 0;
      if (sn) { fx += (sx/sn) * 1.5;           fy += (sy/sn) * 1.5; }
      if (an) { fx += (ax/an - f.vx) * 0.8;    fy += (ay/an - f.vy) * 0.8; }
      if (cn) { fx += (cx/cn - f.x)  * 0.0005; fy += (cy/cn - f.y)  * 0.0005; }
      const m = 40;
      if (f.x < m)   fx += (m - f.x)   * 0.04;
      if (f.x > W-m) fx -= (f.x-(W-m)) * 0.04;
      if (f.y < m)   fy += (m - f.y)   * 0.04;
      if (f.y > H-m) fy -= (f.y-(H-m)) * 0.04;
      return { fx, fy };
    }

    // ─── Update ───────────────────────────────────────────────────────────────
    function updateFish() {
      for (const f of fish) {
        f.trail.push({ x: f.x, y: f.y });
        if (f.trail.length > TRAIL_LEN) f.trail.shift();

        const { fx, fy } = boidForces(f, fish);
        f.vx += fx * 0.06;
        f.vy += fy * 0.06;
        if (f.dartFrames > 0) f.dartFrames--;

        let spd = Math.hypot(f.vx, f.vy);
        if (spd > MAX_SPEED)               { f.vx *= MAX_SPEED/spd; f.vy *= MAX_SPEED/spd; spd = MAX_SPEED; }
        if (spd < MIN_SPEED && spd > 0.001){ f.vx *= MIN_SPEED/spd; f.vy *= MIN_SPEED/spd; }
        if (spd < 0.001)                   { f.vx = MIN_SPEED; f.vy = 0; }

        f.x += f.vx;
        f.y += f.vy;

        // Hard wall bounce
        const r = f.size;
        if (f.x < r)   { f.x = r;   f.vx =  Math.abs(f.vx) * 0.8; }
        if (f.x > W-r) { f.x = W-r; f.vx = -Math.abs(f.vx) * 0.8; }
        if (f.y < r)   { f.y = r;   f.vy =  Math.abs(f.vy) * 0.8; }
        if (f.y > H-r) { f.y = H-r; f.vy = -Math.abs(f.vy) * 0.8; }

        f.angle = Math.atan2(f.vy, f.vx);
      }
    }

    function updateMotes() {
      for (const m of motes) {
        m.x += m.vx;
        m.y += m.vy;
        if (m.x < -2)  m.x = W + 2;
        if (m.x > W+2) m.x = -2;
        if (m.y < -2)  m.y = H + 2;
        if (m.y > H+2) m.y = -2;
      }
    }

    function updateSparkles() {
      for (let i = sparkles.length - 1; i >= 0; i--) {
        const s = sparkles[i];
        s.x += s.vx; s.y += s.vy;
        s.vx *= 0.88; s.vy *= 0.88;
        s.life -= 0.045;
        if (s.life <= 0) sparkles.splice(i, 1);
      }
    }

    function updateRipples() {
      for (let i = ripples.length - 1; i >= 0; i--) {
        const rpl = ripples[i];
        rpl.r += rpl.speed;
        rpl.opacity = Math.max(0, 1 - rpl.r / rpl.maxR);

        for (const f of fish) {
          if (rpl.triggered.has(f)) continue;
          const d = Math.hypot(f.x - rpl.x, f.y - rpl.y);
          if (d > rpl.r - 8 && d < rpl.r + 8) {
            rpl.triggered.add(f);
            const a = Math.atan2(f.y - rpl.y, f.x - rpl.x);
            f.vx += Math.cos(a) * 5;
            f.vy += Math.sin(a) * 5;
            f.dartFrames = 20;
            playFishNote(f);
          }
        }

        if (rpl.r >= rpl.maxR) ripples.splice(i, 1);
      }
    }

    // ─── Draw ─────────────────────────────────────────────────────────────────
    function drawMotes() {
      for (const m of motes) {
        const alpha = 0.055 + 0.038 * Math.sin(frame * m.spd + m.phase);
        ctx.beginPath();
        ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${m.hue}, 65%, 82%, ${alpha})`;
        ctx.fill();
      }
    }

    function drawFish(f) {
      // Comet tail (world space, before local transform)
      for (let i = 0; i < f.trail.length; i++) {
        const frac = (i + 1) / f.trail.length;
        ctx.beginPath();
        ctx.arc(f.trail[i].x, f.trail[i].y, f.size * 0.3 * frac, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${f.hue}, 65%, 72%, ${frac * 0.22})`;
        ctx.fill();
      }

      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(f.angle);

      // Soft gradient glow aura
      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, f.size * 2.8);
      const lit  = f.dartFrames > 0;
      glow.addColorStop(0, `hsla(${f.hue}, 75%, 75%, ${lit ? 0.28 : 0.18})`);
      glow.addColorStop(1, `hsla(${f.hue}, 75%, 75%, 0)`);
      ctx.beginPath();
      ctx.arc(0, 0, f.size * 2.8, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();

      // Body
      const lightness = lit ? 76 : 58;
      const saturation = lit ? 70 : 52;
      ctx.beginPath();
      ctx.ellipse(0, 0, f.size, f.size * 0.42, 0, 0, Math.PI * 2);
      ctx.fillStyle = `hsl(${f.hue}, ${saturation}%, ${lightness}%)`;
      ctx.fill();

      // Sheen highlight — small bright ellipse offset up-left
      ctx.beginPath();
      ctx.ellipse(f.size * 0.12, -f.size * 0.13, f.size * 0.35, f.size * 0.14, -0.35, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${f.hue}, 80%, 94%, 0.30)`;
      ctx.fill();

      // Forked tail
      ctx.beginPath();
      ctx.moveTo(-f.size * 0.85, 0);
      ctx.lineTo(-f.size * 1.82, -f.size * 0.62);
      ctx.lineTo(-f.size * 1.82,  f.size * 0.62);
      ctx.closePath();
      ctx.fillStyle = `hsl(${f.hue}, 46%, ${lightness - 12}%)`;
      ctx.fill();

      ctx.restore();
    }

    function drawRipple(rpl) {
      // Hue shifts from cool blue (top) to warm cyan (bottom)
      const hue = 195 + (rpl.y / H) * 20;
      ctx.save();
      for (let k = -1; k <= 1; k++) {
        const r = rpl.r + k * 7;
        if (r <= 0) continue;
        const alpha = rpl.opacity * (0.62 - Math.abs(k) * 0.20);
        ctx.beginPath();
        ctx.arc(rpl.x, rpl.y, r, 0, Math.PI * 2);
        ctx.strokeStyle = `hsla(${hue}, 75%, 78%, ${alpha})`;
        ctx.lineWidth = k === 0 ? 1.6 : 0.9;
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawSparkles() {
      for (const s of sparkles) {
        const r = s.life * 3.5;
        ctx.beginPath();
        ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${s.hue}, 85%, 88%, ${s.life * 0.85})`;
        ctx.fill();
      }
    }

    function draw() {
      // Motion blur
      ctx.fillStyle = 'rgba(8, 12, 20, 0.22)';
      ctx.fillRect(0, 0, W, H);

      drawMotes();

      for (const rpl of ripples) drawRipple(rpl);
      drawSparkles();
      for (const f of fish) drawFish(f);

      // Vignette darkens edges — drawn last so it's always crisp
      ctx.fillStyle = vignetteGrad;
      ctx.fillRect(0, 0, W, H);
    }

    function loop() {
      frame++;
      updateFish();
      updateMotes();
      updateSparkles();
      updateRipples();
      draw();
      requestAnimationFrame(loop);
    }

    // ─── Input ────────────────────────────────────────────────────────────────
    function spawnRipple(x, y) {
      if (ripples.length >= MAX_RIPPLES) ripples.shift();
      const maxR = Math.max(W, H) * 0.7;
      ripples.push({ x, y, r: 0, maxR, speed: 2.5, opacity: 1.0, triggered: new Set() });

      // Impact sparkle burst
      const hue = 195 + (y / H) * 20;
      for (let i = 0; i < 10; i++) {
        const a = (i / 10) * Math.PI * 2;
        sparkles.push({
          x, y,
          vx: Math.cos(a) * (1.5 + Math.random() * 2),
          vy: Math.sin(a) * (1.5 + Math.random() * 2),
          life: 0.7 + Math.random() * 0.3,
          hue: hue + (Math.random() - 0.5) * 15,
        });
      }

      playRippleChord(y);
    }

    function canvasPos(e) {
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    function setupInput() {
      canvas.addEventListener('pointerdown', e => {
        e.preventDefault();
        const p = canvasPos(e);
        spawnRipple(p.x, p.y);
      });
    }

    function setupKeyboard() {
      document.addEventListener('keydown', e => {
        switch (e.code) {
          case 'Space':   e.preventDefault(); spawnRipple(W/2, H/2); break;
          case 'KeyR':    scatterFish();       break;
          case 'KeyC':    initFish();          break;
          case 'Digit1':  currentScale = 'gamelan';    break;
          case 'Digit2':  currentScale = 'pentatonic'; break;
          case 'Digit3':  currentScale = 'wholeTone';  break;
          case 'Digit4':  currentScale = 'major';      break;
          case 'Digit5':  currentScale = 'minor';      break;
        }
      });
    }

    function onResize() {
      if (!W || !H) return;
      const rect = canvas.getBoundingClientRect();
      const ox = rect.width / W, oy = rect.height / H;
      setupCanvas(); // also rebuilds vignette
      for (const f   of fish)    { f.x   *= ox; f.y   *= oy; f.trail = []; }
      for (const rpl of ripples) { rpl.x *= ox; rpl.y *= oy; }
      // Rescatter motes across new dimensions
      for (const m of motes)     { m.x   *= ox; m.y   *= oy; }
    }

    const beginEl = document.getElementById('begin');
    function begin() {
      initAudio();
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden && audioCtx && audioCtx.state === 'suspended')
          audioCtx.resume();
      });
      window.addEventListener('pageshow', () => {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      });

      beginEl.style.opacity = '0';
      beginEl.style.pointerEvents = 'none';
      setTimeout(() => beginEl.remove(), 700);

      setupCanvas();
      initFish();
      initMotes();
      setupInput();
      setupKeyboard();
      window.addEventListener('resize', onResize);
      requestAnimationFrame(loop);
    }
    document.addEventListener('pointerdown', begin, { once: true });
  </script>
</body>
</html>
