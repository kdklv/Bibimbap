<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>audio debug</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #080c14;
      color: #e8eaf0;
      font-family: ui-monospace, 'Menlo', monospace;
      font-size: 13px;
      height: 100%;
      overflow: hidden;
    }

    #log {
      position: fixed;
      inset: 0;
      bottom: 80px;
      overflow-y: auto;
      padding: 12px 14px;
      -webkit-overflow-scrolling: touch;
    }

    .entry {
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      line-height: 1.5;
      word-break: break-all;
    }
    .entry.info  { color: #a0c4ff; }
    .entry.ok    { color: #6be89b; }
    .entry.warn  { color: #ffd97d; }
    .entry.error { color: #ff6b6b; }
    .entry.muted { color: rgba(232,234,240,0.35); }
    .ts { color: rgba(255,255,255,0.25); margin-right: 6px; }

    #controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(8,12,20,0.92);
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    button {
      flex: 1;
      background: rgba(160,196,255,0.12);
      border: 1px solid rgba(160,196,255,0.3);
      color: #a0c4ff;
      font-family: inherit;
      font-size: 12px;
      border-radius: 6px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      padding: 0 4px;
      line-height: 1.3;
      text-align: center;
    }
    button:active { background: rgba(160,196,255,0.25); }
    button.primary {
      background: rgba(160,196,255,0.22);
      border-color: rgba(160,196,255,0.6);
      font-weight: 600;
    }
  </style>
</head>
<body>

<div id="log"></div>

<div id="controls">
  <button class="primary" id="btn-init">1. Init Audio</button>
  <button id="btn-play">2. Play Note</button>
  <button id="btn-state">3. Check State</button>
  <button id="btn-clear">Clear</button>
</div>

<script>
  // ─── Logger ──────────────────────────────────────────────────────────────
  const logEl = document.getElementById('log');
  const t0 = Date.now();

  function log(msg, level = 'info') {
    const ms = ((Date.now() - t0) / 1000).toFixed(2);
    const div = document.createElement('div');
    div.className = `entry ${level}`;
    div.innerHTML = `<span class="ts">+${ms}s</span>${escHtml(msg)}`;
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
    console.log(`[${level}] ${msg}`);
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // ─── Device info (logged immediately, no gesture needed) ─────────────────
  log('— device info —', 'muted');
  log(`UA: ${navigator.userAgent}`, 'muted');
  log(`platform: ${navigator.platform || '(none)'}`, 'muted');
  log(`maxTouchPoints: ${navigator.maxTouchPoints}`, 'muted');
  log(`devicePixelRatio: ${window.devicePixelRatio}`, 'muted');
  log(`AudioContext: ${'AudioContext' in window ? 'yes' : 'NO'}`, 'AudioContext' in window ? 'ok' : 'error');
  log(`webkitAudioContext: ${'webkitAudioContext' in window ? 'yes' : 'no'}`, 'muted');
  log(`PointerEvent: ${'PointerEvent' in window ? 'yes' : 'NO'}`, 'PointerEvent' in window ? 'ok' : 'error');
  log(`TouchEvent: ${'TouchEvent' in window ? 'yes' : 'no'}`, 'muted');
  log('— tap "1. Init Audio" —', 'muted');

  // ─── Audio state ─────────────────────────────────────────────────────────
  let audioCtx = null;
  let masterOut = null;
  let convolver = null;

  // ─── Init ─────────────────────────────────────────────────────────────────
  function initAudio() {
    log('initAudio() called', 'info');

    try {
      const Ctor = window.AudioContext || window.webkitAudioContext;
      if (!Ctor) { log('ERROR: no AudioContext constructor', 'error'); return; }
      log(`using: ${Ctor === window.AudioContext ? 'AudioContext' : 'webkitAudioContext'}`, 'info');

      audioCtx = new Ctor();
      log(`created — state: ${audioCtx.state}`, audioCtx.state === 'running' ? 'ok' : 'warn');
      log(`sampleRate: ${audioCtx.sampleRate} Hz`, 'muted');

    } catch (err) {
      log(`new AudioContext() threw: ${err}`, 'error');
      return;
    }

    try {
      const p = audioCtx.resume();
      log(`resume() called — returned: ${p}`, 'info');

      if (p && typeof p.then === 'function') {
        p.then(() => {
          log(`resume() promise resolved — state: ${audioCtx.state}`, audioCtx.state === 'running' ? 'ok' : 'warn');
        }).catch(err => {
          log(`resume() promise rejected: ${err}`, 'error');
        });
      } else {
        log('resume() did not return a Promise (old WebKit)', 'warn');
      }
    } catch (err) {
      log(`resume() threw: ${err}`, 'error');
    }

    // Build minimal graph
    try {
      masterOut = audioCtx.createGain();
      masterOut.gain.value = 0.6;
      masterOut.connect(audioCtx.destination);

      const sr = audioCtx.sampleRate;
      const len = Math.floor(sr * 1.5);
      const buf = audioCtx.createBuffer(2, len, sr);
      for (let c = 0; c < 2; c++) {
        const ch = buf.getChannelData(c);
        for (let i = 0; i < len; i++)
          ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
      }
      convolver = audioCtx.createConvolver();
      convolver.buffer = buf;
      const wet = audioCtx.createGain();
      wet.gain.value = 0.35;
      convolver.connect(wet);
      wet.connect(masterOut);

      log('audio graph built OK', 'ok');
    } catch (err) {
      log(`graph setup threw: ${err}`, 'error');
    }

    // Attach visibilitychange listener
    document.addEventListener('visibilitychange', () => {
      log(`visibilitychange — hidden: ${document.hidden}, ctx state: ${audioCtx ? audioCtx.state : 'null'}`, 'info');
      if (!document.hidden && audioCtx && audioCtx.state === 'suspended') {
        log('attempting resume() on visibility restore...', 'warn');
        audioCtx.resume()
          .then(() => log(`resumed — state: ${audioCtx.state}`, 'ok'))
          .catch(err => log(`resume failed: ${err}`, 'error'));
      }
    });
    window.addEventListener('pageshow', () => {
      log(`pageshow — ctx state: ${audioCtx ? audioCtx.state : 'null'}`, 'info');
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    });

    log('init complete', 'ok');
  }

  // ─── Play note ───────────────────────────────────────────────────────────
  function playTestNote() {
    if (!audioCtx) { log('no audioCtx — run init first', 'error'); return; }

    log(`playNote() — ctx state: ${audioCtx.state}`, audioCtx.state === 'running' ? 'info' : 'warn');

    if (audioCtx.state === 'suspended') {
      log('context suspended — calling resume() before note', 'warn');
      audioCtx.resume()
        .then(() => log(`resumed — state: ${audioCtx.state}`, 'ok'))
        .catch(err => log(`resume failed: ${err}`, 'error'));
    }

    try {
      const freq = 440;
      const t = audioCtx.currentTime;
      log(`currentTime: ${t.toFixed(4)}`, 'muted');

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.linearRampToValueAtTime(0.28, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);

      osc.connect(gain);
      gain.connect(masterOut);
      if (convolver) gain.connect(convolver);

      osc.start(t);
      osc.stop(t + 0.6);

      osc.onended = () => log('oscillator ended (A4, 440 Hz)', 'ok');
      log('oscillator started — you should hear A4 (440 Hz)', 'ok');

    } catch (err) {
      log(`playNote threw: ${err}`, 'error');
    }
  }

  // ─── State dump ──────────────────────────────────────────────────────────
  function checkState() {
    log('— state snapshot —', 'muted');
    if (!audioCtx) {
      log('audioCtx: null', 'warn');
      return;
    }
    log(`audioCtx.state: ${audioCtx.state}`, audioCtx.state === 'running' ? 'ok' : 'warn');
    log(`audioCtx.currentTime: ${audioCtx.currentTime.toFixed(4)}`, 'muted');
    log(`audioCtx.sampleRate: ${audioCtx.sampleRate}`, 'muted');
    log(`document.hidden: ${document.hidden}`, 'muted');
    try {
      // Try creating a dummy node — throws if context is in bad state
      const g = audioCtx.createGain();
      g.disconnect();
      log('createGain(): OK', 'ok');
    } catch (err) {
      log(`createGain() threw: ${err}`, 'error');
    }
  }

  // ─── Buttons ─────────────────────────────────────────────────────────────
  document.getElementById('btn-init').addEventListener('pointerdown', e => {
    e.preventDefault();
    log('— btn: Init Audio (pointerdown) —', 'muted');
    initAudio();
  });

  document.getElementById('btn-play').addEventListener('pointerdown', e => {
    e.preventDefault();
    log('— btn: Play Note (pointerdown) —', 'muted');
    playTestNote();
  });

  document.getElementById('btn-state').addEventListener('pointerdown', e => {
    e.preventDefault();
    checkState();
  });

  document.getElementById('btn-clear').addEventListener('pointerdown', e => {
    e.preventDefault();
    logEl.innerHTML = '';
    log('cleared', 'muted');
  });

  // Global error catcher
  window.addEventListener('error', e => {
    log(`uncaught error: ${e.message} (${e.filename}:${e.lineno})`, 'error');
  });
  window.addEventListener('unhandledrejection', e => {
    log(`unhandled promise rejection: ${e.reason}`, 'error');
  });
</script>
</body>
</html>
