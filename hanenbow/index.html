<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>hanenbow</title>
  <link rel="stylesheet" href="../shared/theme.css">
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="begin-screen" id="begin">touch to begin</div>

  <script src="../shared/audio.js"></script>
  <script>
    // ─── Canvas ──────────────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    let ctx, W, H;

    function setupCanvas() {
      const dpr  = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      W = rect.width;
      H = rect.height;
      canvas.width  = W * dpr;
      canvas.height = H * dpr;
      ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
    }

    // ─── Ball types ──────────────────────────────────────────────────────────
    const BALL_DEFS = [
      { key: 'normal', r: 8,  gravity: 0.25, speedCap: 18, boost: 1.05 },
      { key: 'heavy',  r: 12, gravity: 0.40, speedCap: 22, boost: 1.02 },
      { key: 'light',  r: 5,  gravity: 0.10, speedCap: 14, boost: 1.08 },
    ];
    const TYPE_HUES  = [210, 22, 165];   // blue / orange / teal — one per type
    const BALL_HUES  = [195, 265, 340, 52, 130];  // per-ball trail colours (up to 5)
    let   ballTypeIdx = 0;

    // ─── Default layout ──────────────────────────────────────────────────────
    const LAYOUT = [
      { xf: 0.20, yf: 0.30, a:  0.35, len: 90  },
      { xf: 0.50, yf: 0.22, a:  0.00, len: 110 },
      { xf: 0.80, yf: 0.30, a: -0.35, len: 90  },
      { xf: 0.14, yf: 0.55, a:  0.28, len: 80  },
      { xf: 0.43, yf: 0.51, a: -0.10, len: 95  },
      { xf: 0.72, yf: 0.55, a: -0.28, len: 85  },
      { xf: 0.36, yf: 0.76, a:  0.18, len: 88  },
    ];

    // ─── State ───────────────────────────────────────────────────────────────
    let leaves       = [];
    let balls        = [];    // up to 5
    let emitter      = { x: 0, y: 0 };
    let particles    = [];    // sparks from leaf hits
    let caustics     = [];    // ambient background blobs
    let currentScale = 'pentatonic';

    // Water simulation
    const WATER_COLS = 80;
    let   waterY     = null;   // Float32Array — displacement from rest (px, down = positive)
    let   waterV     = null;   // Float32Array — velocity
    let   waterRestY = 0;      // rest y of water surface
    let   sprayParticles = []; // water droplets from splashes

    // ─── Leaf factory ────────────────────────────────────────────────────────
    function makeLeaf(x, y, angle, len) {
      const clampedAngle = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, angle));
      const halfLen      = len !== undefined ? len : 60 + Math.random() * 60;
      return {
        x, y,
        displayX: x, displayY: y,
        angle: clampedAngle,
        len:   halfLen,
        dragging:      false,
        dragOffsetX:   0,
        dragOffsetY:   0,
        velHistory:    [],
        releaseVelX:   0,
        releaseVelY:   0,
        wobble:        0,
        wobbleVel:     0,
        flashT:        -Infinity,
        lastNoteTime:  -Infinity,
        lastRotateTime:-Infinity,
      };
    }

    function initLeaves() {
      leaves = LAYOUT.map(d => makeLeaf(d.xf * W, d.yf * H, d.a, d.len));
    }

    function randomiseLeaves() {
      for (const leaf of leaves) {
        leaf.x     = leaf.len + 10 + Math.random() * (W - 2 * leaf.len - 20);
        leaf.y     = 60 + Math.random() * (H * 0.82);
        leaf.angle = (Math.random() - 0.5) * (2 * Math.PI / 3);
        leaf.releaseVelX = 0;
        leaf.releaseVelY = 0;
      }
    }

    // ─── Emitter ─────────────────────────────────────────────────────────────
    function resetEmitter() {
      emitter.x = W / 2;
      emitter.y = H * 0.07;
    }

    // ─── Ball spawner ────────────────────────────────────────────────────────
    function spawnBall() {
      if (balls.length >= 5) balls.shift();
      const def = BALL_DEFS[ballTypeIdx];
      balls.push({
        x:        emitter.x,
        y:        emitter.y,
        vx:       (Math.random() - 0.5) * 6,
        vy:       1,
        r:        def.r,
        gravity:  def.gravity,
        speedCap: def.speedCap,
        boost:    def.boost,
        trail:    [],
        stuckTimer: 0,
        hue:      BALL_HUES[balls.length % 5],
      });
    }

    // ─── Water init + simulation ─────────────────────────────────────────────
    function initWater() {
      waterRestY      = H * 0.87;
      waterY          = new Float32Array(WATER_COLS);
      waterV          = new Float32Array(WATER_COLS);
      sprayParticles  = [];
    }

    function splashWater(xPixel, strength) {
      const col    = Math.round((xPixel / W) * (WATER_COLS - 1));
      const radius = 7;
      for (let i = Math.max(0, col - radius); i <= Math.min(WATER_COLS - 1, col + radius); i++) {
        waterV[i] += strength * (1 - Math.abs(i - col) / (radius + 1));
      }
    }

    function emitSpray(x, surfaceY, ballVy) {
      const count = Math.min(12, 4 + Math.floor(Math.abs(ballVy) * 0.55));
      for (let k = 0; k < count; k++) {
        const angle = -Math.PI * 0.5 + (Math.random() - 0.5) * Math.PI * 0.75;
        const spd   = 2 + Math.random() * Math.abs(ballVy) * 0.7;
        sprayParticles.push({
          x:    x + (Math.random() - 0.5) * 26,
          y:    surfaceY,
          vx:   Math.cos(angle) * spd,
          vy:   Math.sin(angle) * spd,
          life: 1.0,
          r:    1.2 + Math.random() * 2.8,
        });
      }
    }

    function updateWater() {
      for (let i = 0; i < WATER_COLS; i++) {
        waterV[i] += -0.022 * waterY[i];  // spring toward rest
        waterV[i] *= 0.94;                // damping
        waterY[i] += waterV[i];
      }
      // Wave propagation — two passes for stability
      for (let pass = 0; pass < 2; pass++) {
        for (let i = 0; i < WATER_COLS - 1; i++) {
          const diff    = 0.14 * (waterY[i] - waterY[i + 1]);
          waterV[i]    -= diff;
          waterV[i + 1] += diff;
        }
      }
    }

    function updateSpray() {
      for (let i = sprayParticles.length - 1; i >= 0; i--) {
        const p = sprayParticles[i];
        p.vy   += 0.22;     // gravity on droplets
        p.x    += p.vx;
        p.y    += p.vy;
        p.vx   *= 0.97;
        p.life -= 0.024;
        // Droplet re-enters water → tiny ripple
        if (p.vy > 0 && waterY) {
          const col = Math.max(0, Math.min(WATER_COLS - 1, Math.round((p.x / W) * (WATER_COLS - 1))));
          if (p.y >= waterRestY + waterY[col]) {
            splashWater(p.x, p.vy * p.r * 0.09);
            sprayParticles.splice(i, 1);
            continue;
          }
        }
        if (p.life <= 0) sprayParticles.splice(i, 1);
      }
    }

    // ─── Caustics init ────────────────────────────────────────────────────────
    function initCaustics() {
      caustics = Array.from({ length: 5 }, (_, i) => ({
        x:     W * (0.12 + i * 0.19),
        y:     H * (0.25 + (i % 2) * 0.38),
        phase: Math.random() * Math.PI * 2,
        r:     90 + Math.random() * 70,
        hue:   130 + Math.random() * 50,
      }));
    }

    // ─── Physics helpers ─────────────────────────────────────────────────────
    function leafEffAngle(leaf) {
      return Math.max(-Math.PI / 3, Math.min(Math.PI / 3, leaf.angle + leaf.wobble));
    }

    function leafHit(b, leaf) {
      const eff = leafEffAngle(leaf);
      const ax = leaf.displayX - Math.cos(eff) * leaf.len;
      const ay = leaf.displayY - Math.sin(eff) * leaf.len;
      const bx = leaf.displayX + Math.cos(eff) * leaf.len;
      const by = leaf.displayY + Math.sin(eff) * leaf.len;
      const dx = bx - ax, dy = by - ay;
      const t  = Math.max(0, Math.min(1,
        ((b.x - ax) * dx + (b.y - ay) * dy) / (dx * dx + dy * dy)
      ));
      return Math.hypot(b.x - (ax + t * dx), b.y - (ay + t * dy)) < b.r + 3;
    }

    function reflect(b, leaf) {
      const eff = leafEffAngle(leaf);
      const nx  = -Math.sin(eff);
      const ny  =  Math.cos(eff);
      const dot = b.vx * nx + b.vy * ny;
      b.vx -= 2 * dot * nx;
      b.vy -= 2 * dot * ny;
    }

    function pushOut(b, leaf) {
      const eff = leafEffAngle(leaf);
      const ax = leaf.displayX - Math.cos(eff) * leaf.len;
      const ay = leaf.displayY - Math.sin(eff) * leaf.len;
      const bx = leaf.displayX + Math.cos(eff) * leaf.len;
      const by = leaf.displayY + Math.sin(eff) * leaf.len;
      const dx = bx - ax, dy = by - ay;
      const t  = Math.max(0, Math.min(1,
        ((b.x - ax) * dx + (b.y - ay) * dy) / (dx * dx + dy * dy)
      ));
      const cpx = ax + t * dx, cpy = ay + t * dy;
      const ox  = b.x - cpx, oy = b.y - cpy;
      const od  = Math.hypot(ox, oy) || 1;
      const overlap = (b.r + 3) - od;
      if (overlap > 0) {
        b.x += (ox / od) * overlap;
        b.y += (oy / od) * overlap;
      }
    }

    // ─── Particles ───────────────────────────────────────────────────────────
    function emitSparks(b, leaf) {
      if (particles.length > 56) return;
      // Fan out in the post-bounce direction of the ball
      const baseAngle = Math.atan2(b.vy, b.vx);
      for (let i = 0; i < 7; i++) {
        const spread = (Math.random() - 0.5) * Math.PI * 0.9;
        const angle  = baseAngle + spread;
        const spd    = 1.5 + Math.random() * 4.5;
        particles.push({
          x: b.x, y: b.y,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          life: 1.0,
          hue: b.hue,
          r:   1 + Math.random() * 2.2,
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.vy  += 0.06;
        p.x   += p.vx;
        p.y   += p.vy;
        p.vx  *= 0.94;
        p.vy  *= 0.94;
        p.life -= 0.032;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    // ─── Update ──────────────────────────────────────────────────────────────
    function updateLeaves() {
      for (const leaf of leaves) {
        if (!leaf.dragging) {
          const speed = Math.hypot(leaf.releaseVelX, leaf.releaseVelY);
          if (speed > 0.05) {
            leaf.x += leaf.releaseVelX;
            leaf.y += leaf.releaseVelY;
            leaf.releaseVelX *= 0.88;
            leaf.releaseVelY *= 0.88;
            leaf.x = Math.max(20, Math.min(W - 20, leaf.x));
            leaf.y = Math.max(20, Math.min(H - 20, leaf.y));
          }
        }
        leaf.wobbleVel += -leaf.wobble * 0.18;
        leaf.wobbleVel *= 0.80;
        leaf.wobble    += leaf.wobbleVel;
        leaf.displayX  += (leaf.x - leaf.displayX) * 0.18;
        leaf.displayY  += (leaf.y - leaf.displayY) * 0.18;
      }
    }

    function updateBalls() {
      // Iterate backwards so splice indices stay valid
      for (let i = balls.length - 1; i >= 0; i--) {
        const b = balls[i];

        b.vy += b.gravity;
        const spd = Math.hypot(b.vx, b.vy);
        if (spd > b.speedCap) { b.vx *= b.speedCap / spd; b.vy *= b.speedCap / spd; }

        b.x += b.vx;
        b.y += b.vy;

        // Wall bounce (silent)
        if (b.x < b.r)       { b.x = b.r;       b.vx *= -0.9; }
        if (b.x > W - b.r)   { b.x = W - b.r;   b.vx *= -0.9; }
        if (b.y < b.r)       { b.y = b.r;        b.vy *= -0.9; }
        // Water surface collision — ball splashes and sinks
        if (waterY) {
          const wCol    = Math.max(0, Math.min(WATER_COLS - 1, Math.round((b.x / W) * (WATER_COLS - 1))));
          const surfaceY = waterRestY + waterY[wCol];
          if (b.vy > 0 && b.y + b.r * 0.5 >= surfaceY) {
            splashWater(b.x, b.vy * b.r * 0.30);
            emitSpray(b.x, surfaceY, b.vy);
            balls.splice(i, 1);
            if (balls.length === 0) spawnBall();
            continue;
          }
        }

        if (b.y > H + 80)    {
          balls.splice(i, 1);
          if (balls.length === 0) spawnBall();
          continue;
        }

        // Leaf collisions
        for (const leaf of leaves) {
          if (!leafHit(b, leaf)) continue;
          pushOut(b, leaf);
          reflect(b, leaf);
          b.vx *= b.boost;
          b.vy *= b.boost;

          // Angular impulse: hit near tip → more wobble
          const eff  = leafEffAngle(leaf);
          const hax  = leaf.displayX - Math.cos(eff) * leaf.len;
          const hay  = leaf.displayY - Math.sin(eff) * leaf.len;
          const hbx  = leaf.displayX + Math.cos(eff) * leaf.len;
          const hby  = leaf.displayY + Math.sin(eff) * leaf.len;
          const hdx  = hbx - hax, hdy = hby - hay;
          const ht   = Math.max(0, Math.min(1,
            ((b.x - hax) * hdx + (b.y - hay) * hdy) / (hdx * hdx + hdy * hdy)
          ));
          const leverArm    = (ht - 0.5) * 2;
          const hnx         = -Math.sin(eff), hny = Math.cos(eff);
          const impactSpeed = Math.abs(b.vx * hnx + b.vy * hny);
          leaf.wobbleVel   += leverArm * impactSpeed * 0.0022;

          emitSparks(b, leaf);
          leaf.flashT = performance.now();
          triggerLeafNote(leaf);
        }

        // Stuck detection
        if (spd < 0.5) b.stuckTimer++;
        else           b.stuckTimer = 0;
        if (b.stuckTimer > 120) {
          balls.splice(i, 1);
          if (balls.length === 0) spawnBall();
          continue;
        }

        // Trail
        b.trail.push({ x: b.x, y: b.y });
        if (b.trail.length > 20) b.trail.shift();
      }
    }

    function update() {
      updateLeaves();
      updateBalls();
      updateParticles();
      updateWater();
      updateSpray();
    }

    // ─── Audio ───────────────────────────────────────────────────────────────
    let audioCtx  = null;
    let convolver = null;
    let masterOut = null;

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume();

      masterOut = audioCtx.createGain();
      masterOut.gain.value = 0.68;
      masterOut.connect(audioCtx.destination);

      const sr  = audioCtx.sampleRate;
      const len = Math.floor(sr * 2.0);
      const buf = audioCtx.createBuffer(2, len, sr);
      for (let c = 0; c < 2; c++) {
        const ch = buf.getChannelData(c);
        for (let i = 0; i < len; i++)
          ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.0);
      }
      convolver = audioCtx.createConvolver();
      convolver.buffer = buf;
      const wet = audioCtx.createGain();
      wet.gain.value = 0.32;
      convolver.connect(wet);
      wet.connect(masterOut);
    }

    function playNote(midi, attack, decay, vol) {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const freq = 440 * Math.pow(2, (midi - 69) / 12);
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = audioCtx.currentTime;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.linearRampToValueAtTime(vol, t + attack);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + attack + decay);
      osc.connect(gain);
      gain.connect(masterOut);
      gain.connect(convolver);
      osc.start(t);
      osc.stop(t + attack + decay + 0.1);
    }

    function leafAngleToMidi(leaf) {
      const t      = (leaf.angle + Math.PI / 3) / (2 * Math.PI / 3);
      const scale  = Audio.scales[currentScale];
      const total  = scale.length * 2;
      const idx    = Math.max(0, Math.min(total - 1, Math.floor(t * total)));
      const octave = Math.floor(idx / scale.length);
      const degree = scale[idx % scale.length];
      return 60 + octave * 12 + degree;
    }

    function triggerLeafNote(leaf) {
      const now = performance.now();
      if (now - leaf.lastNoteTime < 80) return;
      leaf.lastNoteTime = now;
      playNote(leafAngleToMidi(leaf), 0.001, 0.6, 0.35);
    }

    // ─── Draw ────────────────────────────────────────────────────────────────

    function drawBackground(now) {
      // Motion-blur persistence
      ctx.fillStyle = 'rgba(8, 12, 20, 0.25)';
      ctx.fillRect(0, 0, W, H);

      // Ambient caustic blobs — drift slowly, radial gradient glow
      const t = now * 0.0003;
      for (const c of caustics) {
        const cx = c.x + Math.cos(t * 0.55 + c.phase) * 38;
        const cy = c.y + Math.sin(t * 0.38 + c.phase * 1.3) * 22;
        const g  = ctx.createRadialGradient(cx, cy, 0, cx, cy, c.r);
        g.addColorStop(0, `hsla(${c.hue}, 55%, 40%, 0.055)`);
        g.addColorStop(1, `hsla(${c.hue}, 55%, 40%, 0)`);
        ctx.save();
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx, cy, c.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawLeaf(leaf, now) {
      const flash     = Math.max(0, 1 - (now - leaf.flashT) / 300);
      // Hue varies with angle: left-leaning → teal (165), flat → green (135), right-leaning → lime (105)
      const tAngle    = (leaf.angle + Math.PI / 3) / (2 * Math.PI / 3);
      const hue       = 165 - tAngle * 60;   // 165 (teal) → 105 (lime-green)
      const lightness = 20 + flash * 42;
      const halfW     = 8  + flash * 6;

      ctx.save();
      ctx.translate(leaf.displayX, leaf.displayY);
      ctx.rotate(leafEffAngle(leaf));

      // Ambient + flash glow on body
      ctx.shadowBlur  = 10 + flash * 24;
      ctx.shadowColor = `hsla(${hue}, 75%, 65%, ${0.10 + flash * 0.85})`;

      // Body ellipse
      ctx.fillStyle = `hsl(${hue}, 48%, ${lightness}%)`;
      ctx.beginPath();
      ctx.ellipse(0, 0, leaf.len, halfW, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;

      // Subtle edge highlight
      ctx.strokeStyle = `hsla(${hue}, 40%, ${lightness + 20}%, 0.2)`;
      ctx.lineWidth   = 0.8;
      ctx.stroke();

      // Midrib — central vein along leaf axis
      ctx.strokeStyle = `hsla(${hue + 10}, 40%, ${lightness + 28}%, 0.5)`;
      ctx.lineWidth   = 0.9;
      ctx.lineCap     = 'round';
      ctx.beginPath();
      ctx.moveTo(-leaf.len * 0.88, 0);
      ctx.lineTo( leaf.len * 0.88, 0);
      ctx.stroke();

      // Side veins — 4 pairs branching from midrib, angling toward nearest tip
      ctx.strokeStyle = `hsla(${hue}, 35%, ${lightness + 22}%, 0.3)`;
      ctx.lineWidth   = 0.5;
      for (let k = 0; k < 4; k++) {
        const vx   = (-0.6 + k * 0.4) * leaf.len;  // –0.6, –0.2, 0.2, 0.6
        const tilt = vx * 0.2;                       // lean toward nearest tip
        ctx.beginPath();
        ctx.moveTo(vx, 0);
        ctx.lineTo(vx + tilt, halfW * 0.82);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(vx, 0);
        ctx.lineTo(vx + tilt, -halfW * 0.82);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawAngleIndicator(leaf, now) {
      const age = now - leaf.lastRotateTime;
      if (age < 0 || age > 1000) return;
      const fade = 1 - age / 1000;
      const R    = 44;
      ctx.save();
      ctx.globalAlpha = fade * 0.28;
      ctx.strokeStyle = '#a0c4ff';
      ctx.lineWidth   = 1.5;
      ctx.lineCap     = 'round';
      ctx.beginPath();
      ctx.arc(leaf.displayX, leaf.displayY, R, -Math.PI / 2 - Math.PI / 3, -Math.PI / 2 + Math.PI / 3);
      ctx.stroke();
      ctx.globalAlpha  = fade * 0.82;
      ctx.lineWidth    = 2;
      const iAngle     = -Math.PI / 2 + leaf.angle;
      ctx.beginPath();
      ctx.moveTo(leaf.displayX, leaf.displayY);
      ctx.lineTo(leaf.displayX + Math.cos(iAngle) * R, leaf.displayY + Math.sin(iAngle) * R);
      ctx.stroke();
      ctx.restore();
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life * 0.88;
        ctx.fillStyle   = `hsl(${p.hue}, 80%, 82%)`;
        ctx.shadowBlur  = 5;
        ctx.shadowColor = `hsl(${p.hue}, 90%, 75%)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0.4, p.r * p.life), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawBall(b) {
      // Hue-tinted trail
      for (let i = 1; i < b.trail.length; i++) {
        const t = i / b.trail.length;
        ctx.save();
        ctx.globalAlpha = t * 0.5;
        ctx.strokeStyle = `hsla(${b.hue}, 72%, 82%, 1)`;
        ctx.lineWidth   = t * b.r * 0.85;
        ctx.lineCap     = 'round';
        ctx.beginPath();
        ctx.moveTo(b.trail[i - 1].x, b.trail[i - 1].y);
        ctx.lineTo(b.trail[i].x,     b.trail[i].y);
        ctx.stroke();
        ctx.restore();
      }

      // Body with type-coloured glow
      ctx.save();
      ctx.shadowBlur  = 18 + b.r;
      ctx.shadowColor = `hsla(${b.hue}, 80%, 88%, 0.7)`;
      ctx.fillStyle   = `hsl(${b.hue}, 55%, 92%)`;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawEmitter(now) {
      const pulse = 0.5 + 0.5 * Math.sin(now * 0.0028);
      const hue   = TYPE_HUES[ballTypeIdx];

      ctx.save();
      ctx.shadowBlur  = 16 + pulse * 10;
      ctx.shadowColor = `hsla(${hue}, 75%, 70%, 0.55)`;

      // Outer pulsing ring
      ctx.strokeStyle = `hsla(${hue}, 65%, 75%, ${0.42 + pulse * 0.35})`;
      ctx.lineWidth   = 1.5;
      ctx.beginPath();
      ctx.arc(emitter.x, emitter.y, 14 + pulse * 2.5, 0, Math.PI * 2);
      ctx.stroke();

      // Inner dot
      ctx.fillStyle  = `hsla(${hue}, 80%, 88%, 0.9)`;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(emitter.x, emitter.y, 3.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawWater(now) {
      if (!waterY) return;
      const colW = W / (WATER_COLS - 1);

      ctx.save();

      // ── Water body (filled shape from surface to bottom edge) ──
      ctx.beginPath();
      ctx.moveTo(0, H);
      ctx.lineTo(0, waterRestY + waterY[0]);
      for (let i = 1; i < WATER_COLS; i++) {
        const mx = (i - 0.5) * colW;
        const my = waterRestY + (waterY[i - 1] + waterY[i]) * 0.5;
        ctx.quadraticCurveTo((i - 1) * colW, waterRestY + waterY[i - 1], mx, my);
      }
      ctx.lineTo(W, waterRestY + waterY[WATER_COLS - 1]);
      ctx.lineTo(W, H);
      ctx.closePath();
      const grad = ctx.createLinearGradient(0, waterRestY - 30, 0, H);
      grad.addColorStop(0,   'hsla(188, 62%, 26%, 0.78)');
      grad.addColorStop(0.28,'hsla(200, 68%, 16%, 0.91)');
      grad.addColorStop(1,   'hsla(215, 75%, 8%,  0.97)');
      ctx.fillStyle = grad;
      ctx.fill();

      // ── Surface glow line ──
      ctx.beginPath();
      ctx.moveTo(0, waterRestY + waterY[0]);
      for (let i = 1; i < WATER_COLS; i++) {
        const mx = (i - 0.5) * colW;
        const my = waterRestY + (waterY[i - 1] + waterY[i]) * 0.5;
        ctx.quadraticCurveTo((i - 1) * colW, waterRestY + waterY[i - 1], mx, my);
      }
      ctx.strokeStyle = 'hsla(188, 82%, 70%, 0.6)';
      ctx.lineWidth   = 1.8;
      ctx.shadowBlur  = 14;
      ctx.shadowColor = 'hsla(188, 88%, 65%, 0.45)';
      ctx.stroke();
      ctx.shadowBlur  = 0;

      // ── Animated shimmer specks on surface ──
      const t = now * 0.001;
      for (let i = 0; i < WATER_COLS; i += 3) {
        const shimmer = Math.pow(Math.max(0, Math.sin(t * 2.3 + i * 0.45 + waterY[i] * 0.08)), 4);
        if (shimmer < 0.28) continue;
        ctx.globalAlpha = shimmer * 0.55;
        ctx.fillStyle   = 'hsla(200, 95%, 90%, 1)';
        ctx.beginPath();
        ctx.arc(i * colW, waterRestY + waterY[i] - 1, 1.4, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      ctx.restore();
    }

    function drawSpray() {
      for (const p of sprayParticles) {
        ctx.save();
        ctx.globalAlpha = p.life * 0.88;
        ctx.shadowBlur  = 7;
        ctx.shadowColor = 'hsla(194, 85%, 78%, 0.8)';
        ctx.fillStyle   = 'hsla(194, 65%, 90%, 1)';
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0.4, p.r * p.life), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function draw(now) {
      drawBackground(now);
      for (const leaf of leaves) drawLeaf(leaf, now);
      for (const leaf of leaves) drawAngleIndicator(leaf, now);
      drawParticles();
      for (const b of balls) drawBall(b);
      drawWater(now);
      drawSpray();
      drawEmitter(now);
    }

    // ─── Loop ────────────────────────────────────────────────────────────────
    function loop(now) {
      update();
      draw(now);
      requestAnimationFrame(loop);
    }

    // ─── Input ───────────────────────────────────────────────────────────────
    const ptrs = new Map();

    let dragLeaf          = null;
    let dragPtrId         = null;
    let dragEmitter       = false;
    let dragEmPtrId       = null;
    let emitterHoldTimer  = null;   // interval for hold-to-spam on mobile
    let rotateLeaf     = null;
    let prevRotAngle   = 0;
    let maxPointers    = 0;

    let mouseX = 0, mouseY = 0;

    let lastTapUpTime = 0;
    let lastTapUpPos  = { x: 0, y: 0 };
    let ptrDownPos    = { x: 0, y: 0 };

    function canvasPos(e) {
      const rect = canvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function nearestLeaf(px, py, maxDist) {
      let best = null, bestDist = maxDist;
      for (const leaf of leaves) {
        const d = Math.hypot(px - leaf.displayX, py - leaf.displayY);
        if (d < bestDist) { bestDist = d; best = leaf; }
      }
      return best;
    }

    function twoFingerAngle() {
      const pts = [...ptrs.entries()].sort((a, b) => a[0] - b[0]).map(e => e[1]);
      return Math.atan2(pts[1].y - pts[0].y, pts[1].x - pts[0].x);
    }

    function twoFingerMid() {
      const vals = [...ptrs.values()];
      return { x: (vals[0].x + vals[1].x) / 2, y: (vals[0].y + vals[1].y) / 2 };
    }

    function onDown(e) {
      e.preventDefault();
      canvas.setPointerCapture(e.pointerId);
      const p = canvasPos(e);
      ptrs.set(e.pointerId, p);
      maxPointers = Math.max(maxPointers, ptrs.size);

      if (ptrs.size === 1) {
        ptrDownPos = { ...p };

        // Emitter takes priority over leaves (30px radius)
        if (Math.hypot(p.x - emitter.x, p.y - emitter.y) < 30) {
          dragEmitter = true;
          dragEmPtrId = e.pointerId;
          spawnBall();                                        // immediate on press
          emitterHoldTimer = setInterval(spawnBall, 380);    // hold → spam
        } else {
          // Try to grab a leaf
          const leaf = nearestLeaf(p.x, p.y, 44);
          if (leaf) {
            dragLeaf           = leaf;
            dragPtrId          = e.pointerId;
            leaf.dragging      = true;
            leaf.dragOffsetX   = leaf.x - p.x;
            leaf.dragOffsetY   = leaf.y - p.y;
            leaf.velHistory    = [];
            leaf.releaseVelX   = 0;
            leaf.releaseVelY   = 0;
          }
        }

      } else if (ptrs.size === 2) {
        if (dragLeaf)    endDrag(false);
        if (dragEmitter) {
          dragEmitter = false; dragEmPtrId = null;
          clearInterval(emitterHoldTimer); emitterHoldTimer = null;
        }
        const mid  = twoFingerMid();
        rotateLeaf = nearestLeaf(mid.x, mid.y, 150);
        if (rotateLeaf) prevRotAngle = twoFingerAngle();
      }
    }

    function onMove(e) {
      const p = canvasPos(e);
      mouseX = p.x;
      mouseY = p.y;

      if (!ptrs.has(e.pointerId)) return;
      ptrs.set(e.pointerId, p);

      if (ptrs.size === 1) {
        if (dragEmitter && e.pointerId === dragEmPtrId) {
          emitter.x = Math.max(20, Math.min(W - 20, p.x));
          emitter.y = Math.max(20, Math.min(H - 20, p.y));
        } else if (dragLeaf && e.pointerId === dragPtrId) {
          dragLeaf.x = p.x + dragLeaf.dragOffsetX;
          dragLeaf.y = p.y + dragLeaf.dragOffsetY;
          dragLeaf.x = Math.max(20, Math.min(W - 20, dragLeaf.x));
          dragLeaf.y = Math.max(20, Math.min(H - 20, dragLeaf.y));
          dragLeaf.velHistory.push({ x: p.x, y: p.y, t: performance.now() });
          if (dragLeaf.velHistory.length > 4) dragLeaf.velHistory.shift();
        }
      } else if (ptrs.size >= 2 && rotateLeaf) {
        const newAngle = twoFingerAngle();
        let delta = newAngle - prevRotAngle;
        if (delta >  Math.PI) delta -= Math.PI * 2;
        if (delta < -Math.PI) delta += Math.PI * 2;
        rotateLeaf.angle = Math.max(
          -Math.PI / 3,
          Math.min( Math.PI / 3, rotateLeaf.angle + delta)
        );
        rotateLeaf.lastRotateTime = performance.now();
        prevRotAngle = newAngle;
      }
    }

    function endDrag(applyMomentum) {
      if (!dragLeaf) return;
      if (applyMomentum) {
        const h = dragLeaf.velHistory;
        if (h.length >= 2) {
          const dt = h[h.length - 1].t - h[0].t;
          if (dt > 0) {
            let vx = (h[h.length - 1].x - h[0].x) / dt * 16;
            let vy = (h[h.length - 1].y - h[0].y) / dt * 16;
            const mag = Math.hypot(vx, vy);
            if (mag > 10) { vx *= 10 / mag; vy *= 10 / mag; }
            dragLeaf.releaseVelX = vx;
            dragLeaf.releaseVelY = vy;
          }
        }
      }
      dragLeaf.dragging = false;
      dragLeaf  = null;
      dragPtrId = null;
    }

    function onUp(e) {
      const p        = canvasPos(e);
      const wasMulti = ptrs.size >= 2;

      if (e.pointerId === dragEmPtrId) {
        dragEmitter = false;
        dragEmPtrId = null;
        clearInterval(emitterHoldTimer);
        emitterHoldTimer = null;
      }
      if (e.pointerId === dragPtrId)   endDrag(true);
      ptrs.delete(e.pointerId);
      if (ptrs.size < 2) rotateLeaf = null;

      if (!wasMulti && ptrs.size === 0 && maxPointers === 1) {
        const moved = Math.hypot(p.x - ptrDownPos.x, p.y - ptrDownPos.y);
        if (moved < 12) {
          const now = performance.now();
          if (
            now - lastTapUpTime < 350 &&
            Math.hypot(p.x - lastTapUpPos.x, p.y - lastTapUpPos.y) < 44
          ) {
            handleDoubleClick(p.x, p.y);
            lastTapUpTime = 0;
          } else {
            lastTapUpTime = now;
            lastTapUpPos  = { ...p };
          }
        }
      }

      if (ptrs.size === 0) maxPointers = 0;
    }

    function onWheel(e) {
      e.preventDefault();
      const leaf = nearestLeaf(mouseX, mouseY, 120);
      if (!leaf) return;
      leaf.angle = Math.max(
        -Math.PI / 3,
        Math.min( Math.PI / 3, leaf.angle + e.deltaY * 0.002)
      );
      leaf.lastRotateTime = performance.now();
    }

    function handleDoubleClick(x, y) {
      // Don't add/remove if near emitter
      if (Math.hypot(x - emitter.x, y - emitter.y) < 30) return;
      const leaf = nearestLeaf(x, y, 50);
      if (leaf) {
        if (leaves.length > 2) leaves.splice(leaves.indexOf(leaf), 1);
      } else {
        if (leaves.length < 12)
          leaves.push(makeLeaf(x, y, (Math.random() - 0.5) * Math.PI / 3));
      }
    }

    function setupInput() {
      canvas.addEventListener('pointerdown',   onDown);
      canvas.addEventListener('pointermove',   onMove);
      canvas.addEventListener('pointerup',     onUp);
      canvas.addEventListener('pointercancel', onUp);
      canvas.addEventListener('wheel', onWheel, { passive: false });
    }

    // ─── Keyboard ────────────────────────────────────────────────────────────
    function setupKeyboard() {
      document.addEventListener('keydown', e => {
        switch (e.code) {
          case 'Space':
            e.preventDefault();
            spawnBall();            // spawn new ball from emitter
            break;
          case 'KeyR':
            e.preventDefault();
            balls = [];
            spawnBall();            // clear all, respawn one
            break;
          case 'KeyV':
            randomiseLeaves();      // was Space — now V
            break;
          case 'KeyC':
            initLeaves();
            break;
          case 'KeyB':
            ballTypeIdx = (ballTypeIdx + 1) % BALL_DEFS.length;
            break;
          case 'Digit1': currentScale = 'gamelan';    break;
          case 'Digit2': currentScale = 'pentatonic'; break;
          case 'Digit3': currentScale = 'wholeTone';  break;
          case 'Digit4': currentScale = 'major';      break;
          case 'Digit5': currentScale = 'minor';      break;
        }
      });
    }

    // ─── Resize ──────────────────────────────────────────────────────────────
    function onResize() {
      if (!W || !H) return;
      const scaleX = canvas.getBoundingClientRect().width  / W;
      const scaleY = canvas.getBoundingClientRect().height / H;
      setupCanvas();
      for (const leaf of leaves) {
        leaf.x        *= scaleX; leaf.displayX *= scaleX;
        leaf.y        *= scaleY; leaf.displayY *= scaleY;
      }
      emitter.x *= scaleX;
      emitter.y *= scaleY;
      for (const b of balls) {
        b.x *= scaleX; b.y *= scaleY;
        b.trail = b.trail.map(pt => ({ x: pt.x * scaleX, y: pt.y * scaleY }));
      }
      initCaustics();
      if (waterY) {
        waterRestY = H * 0.87;
        for (let i = 0; i < WATER_COLS; i++) waterY[i] *= scaleY;
      }
    }

    // ─── Begin gate ──────────────────────────────────────────────────────────
    const beginEl = document.getElementById('begin');

    function begin() {
      initAudio();

      document.addEventListener('visibilitychange', () => {
        if (!document.hidden && audioCtx && audioCtx.state === 'suspended')
          audioCtx.resume();
      });
      window.addEventListener('pageshow', () => {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      });

      beginEl.style.opacity      = '0';
      beginEl.style.pointerEvents = 'none';
      setTimeout(() => beginEl.remove(), 700);

      setupCanvas();
      initLeaves();
      resetEmitter();
      initCaustics();
      initWater();
      spawnBall();
      setupInput();
      setupKeyboard();
      window.addEventListener('resize', onResize);
      requestAnimationFrame(loop);
    }

    document.addEventListener('pointerdown', begin, { once: true });
  </script>
</body>
</html>
