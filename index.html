<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>plankton</title>
  <style>
    :root { --bg: #080c14; --accent: #a0c4ff; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: var(--bg); font-family: system-ui, sans-serif; overflow: hidden; }

    .page {
      display: grid;
      place-items: center;
      width: 100%; height: 100%;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width:  min(640px, calc(100vw - 32px));
      height: min(440px, calc(100vh - 48px));
    }

    h1 {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.3em;
      color: rgba(232,234,240,0.25);
      text-transform: lowercase;
      text-align: center;
      flex-shrink: 0;
    }

    .bento {
      display: grid;
      grid-template-columns: 2fr 1fr 2fr;
      grid-template-rows: 1fr 1fr;
      gap: 6px;
      flex: 1;
      min-height: 0;
    }

    a.card {
      position: relative;
      display: block;
      overflow: hidden;
      text-decoration: none;
      border: 1px solid rgba(160,196,255,0.07);
      transition: border-color 0.25s;
      cursor: pointer;
    }
    a.card:hover { border-color: rgba(160,196,255,0.22); }
    a.card canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

    .card-luminaria { grid-column: 1 / 3; grid-row: 1; }
    .card-hanenbow  { grid-column: 3;     grid-row: 1; }
    .card-tracy     { grid-column: 1;     grid-row: 2; }
    .card-nanocarp  { grid-column: 2 / 4; grid-row: 2; }

    .card-label {
      position: absolute;
      bottom: 10px; left: 12px;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: rgba(232,234,240,0.45);
      text-transform: lowercase;
      pointer-events: none;
      z-index: 1;
    }

    a.card.soon { pointer-events: none; }
    a.card.soon .card-label { color: rgba(232,234,240,0.2); }
  </style>
</head>
<body>
<div class="page">
  <div class="wrap">
    <h1>plankton</h1>
    <div class="bento">
      <a class="card card-luminaria" href="luminaria/">
        <canvas id="cv-l"></canvas>
        <span class="card-label">luminaria</span>
      </a>
      <a class="card card-hanenbow" href="hanenbow/">
        <canvas id="cv-h"></canvas>
        <span class="card-label">hanenbow</span>
      </a>
      <a class="card card-tracy" href="tracy/">
        <canvas id="cv-t"></canvas>
        <span class="card-label">tracy</span>
      </a>
      <a class="card card-nanocarp soon" href="nanocarp/">
        <canvas id="cv-n"></canvas>
        <span class="card-label">nanocarp</span>
      </a>
    </div>
  </div>
</div>

<script>
// ── canvas setup ────────────────────────────────────────────────────────────
function initCanvas(id) {
  const cv  = document.getElementById(id);
  const dpr = window.devicePixelRatio || 1;
  const W   = cv.offsetWidth;
  const H   = cv.offsetHeight;
  cv.width  = W * dpr;
  cv.height = H * dpr;
  const ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);
  return { ctx, W, H };
}

window.addEventListener('load', () => requestAnimationFrame(() => {
  const L  = initCanvas('cv-l');
  const Ha = initCanvas('cv-h');
  const T  = initCanvas('cv-t');
  const N  = initCanvas('cv-n');
  animLuminaria(L.ctx,  L.W,  L.H);
  animHanenbow (Ha.ctx, Ha.W, Ha.H);
  animTracy    (T.ctx,  T.W,  T.H);
  animNanocarp (N.ctx,  N.W,  N.H);
}));

// ── Luminaria – arrow grid + drifting plankton ───────────────────────────────
function animLuminaria(ctx, W, H) {
  const CELL = Math.round(Math.min(W, H) / 5.5);
  const COLS = Math.floor(W / CELL);
  const ROWS = Math.floor(H / CELL);
  const ox   = (W - COLS * CELL) / 2;
  const oy   = (H - ROWS * CELL) / 2;
  const ANGLES = [0, Math.PI/2, Math.PI, -Math.PI/2];

  const dirs = Array.from({length: ROWS}, (_, r) =>
    Array.from({length: COLS}, (_, c) => {
      const bias = [];
      if (r === 0)        bias.push(Math.PI/2);
      if (r === ROWS-1)   bias.push(-Math.PI/2);
      if (c === 0)        bias.push(0);
      if (c === COLS-1)   bias.push(Math.PI);
      return (bias.length && Math.random() < 0.7)
        ? bias[Math.floor(Math.random() * bias.length)]
        : ANGLES[Math.floor(Math.random() * 4)];
    })
  );

  const p = {
    col: COLS/2|0, row: ROWS/2|0, dir: 0,
    x: 0, y: 0, progress: 0, trail: [], hue: 210,
  };
  p.dir = dirs[p.row][p.col];

  const cellHistory = [];

  function cellCentre(r, c) {
    return { x: ox + c*CELL + CELL/2, y: oy + r*CELL + CELL/2 };
  }

  const SPEED = 0.022;

  function update() {
    p.trail.push({x: p.x, y: p.y});
    if (p.trail.length > 16) p.trail.shift();

    p.progress += SPEED;
    if (p.progress >= 1) {
      p.progress -= 1;
      const dx = [1,0,-1,0], dy = [0,1,0,-1];
      const ai = ANGLES.indexOf(p.dir);
      p.col = ((p.col + dx[ai]) % COLS + COLS) % COLS;
      p.row = ((p.row + dy[ai]) % ROWS + ROWS) % ROWS;
      p.dir = dirs[p.row][p.col];

      // Detect oscillation: last 6 cells alternate between same 2 cells
      const key = p.row * COLS + p.col;
      cellHistory.push(key);
      if (cellHistory.length > 6) cellHistory.shift();
      if (cellHistory.length === 6) {
        const stuck = cellHistory[0] === cellHistory[2] &&
                      cellHistory[2] === cellHistory[4] &&
                      cellHistory[1] === cellHistory[3] &&
                      cellHistory[3] === cellHistory[5] &&
                      cellHistory[0] !== cellHistory[1];
        if (stuck) {
          // Rotate the arrow we just arrived at 90° to break the loop
          dirs[p.row][p.col] = ANGLES[(ANGLES.indexOf(dirs[p.row][p.col]) + 1) % 4];
          p.dir = dirs[p.row][p.col];
          cellHistory.length = 0;
        }
      }
    }
    const cur  = cellCentre(p.row, p.col);
    const ni   = ANGLES.indexOf(p.dir);
    const dx   = [1,0,-1,0], dy = [0,1,0,-1];
    const next = cellCentre(p.row + dy[ni], p.col + dx[ni]);
    p.x = cur.x + (next.x - cur.x) * p.progress;
    p.y = cur.y + (next.y - cur.y) * p.progress;
  }

  function draw() {
    ctx.fillStyle = 'rgba(8,12,20,0.3)';
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = 'rgba(160,196,255,0.13)';
    ctx.lineWidth = 1;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const {x: cx, y: cy} = cellCentre(r, c);
      const a = dirs[r][c];
      const L = CELL * 0.22;
      const tx = cx + Math.cos(a)*L, ty = cy + Math.sin(a)*L;
      ctx.beginPath();
      ctx.moveTo(cx - Math.cos(a)*L*0.5, cy - Math.sin(a)*L*0.5);
      ctx.lineTo(tx, ty);
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx - Math.cos(a-0.55)*L*0.55, ty - Math.sin(a-0.55)*L*0.55);
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx - Math.cos(a+0.55)*L*0.55, ty - Math.sin(a+0.55)*L*0.55);
      ctx.stroke();
    }

    for (let i = 0; i < p.trail.length; i++) {
      ctx.fillStyle = `hsla(${p.hue},80%,75%,${(i/p.trail.length)*0.45})`;
      ctx.beginPath();
      ctx.arc(p.trail[i].x, p.trail[i].y, 1.8, 0, Math.PI*2);
      ctx.fill();
    }

    ctx.save();
    ctx.shadowBlur = 14; ctx.shadowColor = `hsla(${p.hue},80%,75%,0.8)`;
    ctx.fillStyle = `hsla(${p.hue},80%,82%,0.95)`;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  (function loop() { update(); draw(); requestAnimationFrame(loop); })();
}

// ── Hanenbow – leaves + bouncing ball ────────────────────────────────────────
function animHanenbow(ctx, W, H) {
  const leaves = [
    { x: W*0.5,  y: H*0.75, a: -0.35, len: W*0.85 },
    { x: W*0.35, y: H*0.47, a:  0.45, len: W*0.65 },
    { x: W*0.7,  y: H*0.32, a: -0.5,  len: W*0.65 },
  ];

  const ball = { x: W*0.5, y: H*0.15, vx: 0.8, vy: 0, r: 4 };

  function segNearest(px, py, ax, ay, bx, by) {
    const ddx = bx-ax, ddy = by-ay, l2 = ddx*ddx+ddy*ddy;
    const t = Math.max(0, Math.min(1, ((px-ax)*ddx+(py-ay)*ddy)/l2));
    return { x: ax+t*ddx, y: ay+t*ddy };
  }

  const trail = [];

  function update() {
    ball.vy += 0.2;
    ball.x  += ball.vx;
    ball.y  += ball.vy;

    if (ball.x < ball.r)   { ball.x = ball.r;   ball.vx *= -0.85; }
    if (ball.x > W-ball.r) { ball.x = W-ball.r; ball.vx *= -0.85; }
    if (ball.y > H + 30)   { ball.x = W/2; ball.y = H*0.1; ball.vx = (Math.random()-0.5)*2.5; ball.vy = 0; }

    for (const l of leaves) {
      const nx = -Math.sin(l.a), ny = Math.cos(l.a);
      const ax = l.x - Math.cos(l.a)*l.len/2, ay = l.y - Math.sin(l.a)*l.len/2;
      const bx = l.x + Math.cos(l.a)*l.len/2, by = l.y + Math.sin(l.a)*l.len/2;
      const c  = segNearest(ball.x, ball.y, ax, ay, bx, by);
      const dx = ball.x-c.x, dy = ball.y-c.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist < ball.r + 2) {
        const dot = ball.vx*nx + ball.vy*ny;
        ball.vx = (ball.vx - 2*dot*nx) * 1.03;
        ball.vy = (ball.vy - 2*dot*ny) * 1.03;
        const ov = ball.r + 2 - dist;
        ball.x += dx/dist*ov; ball.y += dy/dist*ov;
      }
    }

    const spd = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
    if (spd > 9) { ball.vx = ball.vx/spd*9; ball.vy = ball.vy/spd*9; }

    trail.push({x: ball.x, y: ball.y});
    if (trail.length > 22) trail.shift();
  }

  function draw() {
    ctx.fillStyle = 'rgba(8,12,20,0.25)';
    ctx.fillRect(0, 0, W, H);

    for (const l of leaves) {
      const ax = l.x - Math.cos(l.a)*l.len/2, ay = l.y - Math.sin(l.a)*l.len/2;
      const bx = l.x + Math.cos(l.a)*l.len/2, by = l.y + Math.sin(l.a)*l.len/2;
      ctx.save();
      ctx.shadowBlur = 6; ctx.shadowColor = 'rgba(100,210,130,0.35)';
      ctx.strokeStyle = 'rgba(110,210,140,0.6)'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
      ctx.restore();
    }

    for (let i = 0; i < trail.length; i++) {
      ctx.fillStyle = `rgba(160,196,255,${(i/trail.length)*0.4})`;
      ctx.beginPath(); ctx.arc(trail[i].x, trail[i].y, 1.5, 0, Math.PI*2); ctx.fill();
    }

    ctx.save();
    ctx.shadowBlur = 16; ctx.shadowColor = 'rgba(160,196,255,0.9)';
    ctx.fillStyle = 'rgba(210,225,255,0.95)';
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  (function loop() { update(); draw(); requestAnimationFrame(loop); })();
}

// ── Tracy – path draw → creature swim → fade loop ────────────────────────────
function animTracy(ctx, W, H) {
  const DRAW_F = 160, SWIM_F = 220, FADE_F = 50;
  let phase = 'drawing', t = 0;

  function makePath() {
    const pts = [], steps = 72, cx = W/2, cy = H/2;
    const rx = W*0.36, ry = H*0.36;
    for (let i = 0; i <= steps; i++) {
      const a = (i/steps)*Math.PI*2;
      pts.push({
        x: cx + Math.cos(a)*rx + Math.sin(a*2)*rx*0.22,
        y: cy + Math.sin(a)*ry + Math.cos(a*3)*ry*0.15,
      });
    }
    return pts;
  }

  let path = makePath();

  function lerp(a, b, t) { return { x: a.x+(b.x-a.x)*t, y: a.y+(b.y-a.y)*t }; }

  function getPt(frac) {
    frac = ((frac % 1) + 1) % 1;
    const i = frac * (path.length-1);
    const a = path[Math.floor(i)], b = path[Math.ceil(i)] || path[0];
    return lerp(a, b, i - Math.floor(i));
  }

  let fade = 1;

  function draw() {
    ctx.fillStyle = 'rgba(8,12,20,0.2)';
    ctx.fillRect(0, 0, W, H);

    const drawnFrac = phase === 'drawing' ? t/DRAW_F : 1;
    const pathAlpha = 0.28 * fade;

    // path
    ctx.save();
    ctx.strokeStyle = `rgba(160,196,255,${pathAlpha})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    const count = Math.floor(drawnFrac * path.length);
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < count; i++) ctx.lineTo(path[i].x, path[i].y);
    ctx.stroke();
    ctx.restore();

    // creature (only after drawing)
    if (phase !== 'drawing') {
      const frac  = (t / SWIM_F) % 1;
      const pos   = getPt(frac);
      const ahead = getPt(frac + 0.012);
      const angle = Math.atan2(ahead.y-pos.y, ahead.x-pos.x);
      const a     = fade * 0.9;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.shadowBlur  = 10; ctx.shadowColor = 'rgba(160,196,255,0.6)';
      ctx.translate(pos.x, pos.y); ctx.rotate(angle);
      ctx.fillStyle = 'rgba(210,225,255,0.9)';
      ctx.beginPath(); ctx.ellipse(0, 0, 5.5, 2.5, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(160,196,255,0.5)';
      ctx.beginPath(); ctx.moveTo(-5.5,0); ctx.lineTo(-9,-3.5); ctx.lineTo(-9,3.5); ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    t++;
    if (phase === 'drawing' && t >= DRAW_F)  { phase = 'swimming'; t = 0; fade = 1; }
    if (phase === 'swimming' && t >= SWIM_F) { phase = 'fading';   t = 0; }
    if (phase === 'fading') {
      fade = 1 - t/FADE_F;
      if (t >= FADE_F) { phase = 'drawing'; t = 0; fade = 1; ctx.clearRect(0,0,W,H); path = makePath(); }
    }
  }

  (function loop() { draw(); requestAnimationFrame(loop); })();
}

// ── Nanocarp – fish school ────────────────────────────────────────────────────
function animNanocarp(ctx, W, H) {
  const fish = Array.from({length: 16}, (_, i) => ({
    x:    W/2 + (Math.random()-0.5)*W*0.7,
    y:    H/2 + (Math.random()-0.5)*H*0.7,
    a:    Math.random()*Math.PI*2,
    spd:  0.35 + Math.random()*0.25,
    turn: (Math.random()-0.5)*0.018,
    sz:   2.8 + Math.random()*2.2,
    hue:  195 + Math.random()*30,
    phase: Math.random()*Math.PI*2,
  }));

  let frame = 0;

  function draw() {
    ctx.fillStyle = 'rgba(8,12,20,0.2)';
    ctx.fillRect(0, 0, W, H);

    frame++;
    for (const f of fish) {
      f.a += f.turn + Math.sin(frame*0.007 + f.phase)*0.008;
      f.x += Math.cos(f.a)*f.spd;
      f.y += Math.sin(f.a)*f.spd;
      if (f.x < -8) f.x = W+8;
      if (f.x > W+8) f.x = -8;
      if (f.y < -8) f.y = H+8;
      if (f.y > H+8) f.y = -8;

      ctx.save();
      ctx.translate(f.x, f.y); ctx.rotate(f.a);
      ctx.fillStyle = `hsla(${f.hue},55%,68%,0.65)`;
      ctx.beginPath(); ctx.ellipse(0, 0, f.sz, f.sz*0.42, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = `hsla(${f.hue},55%,68%,0.35)`;
      ctx.beginPath();
      ctx.moveTo(-f.sz, 0); ctx.lineTo(-f.sz*1.8, -f.sz*0.5); ctx.lineTo(-f.sz*1.8, f.sz*0.5);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  }

  (function loop() { draw(); requestAnimationFrame(loop); })();
}
</script>
</body>
</html>
